name: teardown

# infra/ephemeral 전체 삭제. RDS final snapshot 자동 생성 + 추가로 manual snapshot 1개를
# 안전망으로 더 떠 둔다. persistent / bootstrap 은 절대 건드리지 않는다.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '실수 방지를 위해 정확히 "TEARDOWN" 입력.'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  TFSTATE_BUCKET_PREFIX: ku-helper-tfstate
  TFLOCK_TABLE: ku-helper-tflock

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirm input
        run: |
          if [ "${{ inputs.confirm }}" != "TEARDOWN" ]; then
            echo "confirm input must be exactly TEARDOWN, got: ${{ inputs.confirm }}" >&2
            exit 1
          fi

  pre-snapshot:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.DEPLOYMENT_AWS_ACCOUNT_ID }}:role/ku-helper-github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Manual snapshot
        run: |
          STAMP=$(date -u +"%Y%m%d-%H%M%S")
          SNAP_ID="ku-helper-manual-${STAMP}"
          # create-db-snapshot 는 즉시 반환하면서 인스턴스를 backing-up 상태로 만든다.
          # 완료까지 기다리지 않으면 다음 terraform-destroy 의 final_snapshot 생성이
          # InvalidDBInstanceState (not available) 로 실패한다.
          if aws rds create-db-snapshot \
            --db-instance-identifier ku-helper-pg \
            --db-snapshot-identifier "$SNAP_ID"; then
            echo "Waiting for manual snapshot $SNAP_ID to complete..."
            aws rds wait db-snapshot-completed --db-snapshot-identifier "$SNAP_ID"
          else
            # 실패해도 terraform 의 final_snapshot 가 마지막 안전망. 진행.
            echo "manual snapshot 생성 실패; terraform final_snapshot 안전망으로 진행." >&2
          fi

  terraform-destroy:
    needs: pre-snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.DEPLOYMENT_AWS_ACCOUNT_ID }}:role/ku-helper-github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.5
          # wrapper 가 stdout 에 추가 텍스트를 섞어 $(terraform output -raw ...) 치환을 오염시킨다.
          terraform_wrapper: false

      - name: Wait for RDS available
        # pre-snapshot 이후에도 backing-up 등 전이 상태가 남아있을 수 있다.
        # terraform 이 final_snapshot 를 만들려면 인스턴스가 available 이어야 한다.
        # 인스턴스가 이미 없는 경우(부분 실패 재실행)엔 wait 가 에러내므로 무시.
        run: |
          aws rds wait db-instance-available --db-instance-identifier ku-helper-pg || true

      - name: terraform destroy
        working-directory: infra/ephemeral
        env:
          TF_VAR_tfstate_bucket: ${{ env.TFSTATE_BUCKET_PREFIX }}-${{ secrets.DEPLOYMENT_AWS_ACCOUNT_ID }}
          TF_VAR_developer_ip_cidr: "0.0.0.0/32"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_VAR_tfstate_bucket}" \
            -backend-config="dynamodb_table=${TFLOCK_TABLE}" \
            -backend-config="region=${AWS_REGION}"
          terraform destroy -auto-approve
