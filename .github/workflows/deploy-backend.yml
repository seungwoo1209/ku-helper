name: deploy-backend

# backend 컨테이너 이미지 빌드·푸시 → bastion 경유 alembic 마이그레이션 → app EC2 rollout.
# 단독 실행도 가능하고 deploy-backend-bot-startup.yml / spin-up.yml 에서 workflow_call 로도 호출.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  id-token: write
  packages: write

env:
  AWS_REGION: ap-northeast-2
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/ku-helper-backend
  TFSTATE_BUCKET_PREFIX: ku-helper-tfstate
  TFLOCK_TABLE: ku-helper-tflock

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.DEPLOYMENT_AWS_ACCOUNT_ID }}:role/ku-helper-github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: meta
        run: |
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=${short_sha}" >>"$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:main
            ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate-and-rollout:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.DEPLOYMENT_AWS_ACCOUNT_ID }}:role/ku-helper-github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - uses: astral-sh/setup-uv@v3

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.5
          # wrapper 가 stdout 에 추가 텍스트를 섞어 $(terraform output -raw ...) 치환을 오염시킨다.
          terraform_wrapper: false

      - name: Resolve infra outputs
        id: tf
        working-directory: infra/ephemeral
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          terraform init \
            -backend-config="bucket=${TFSTATE_BUCKET_PREFIX}-${ACCOUNT_ID}" \
            -backend-config="dynamodb_table=${TFLOCK_TABLE}" \
            -backend-config="region=${AWS_REGION}"
          # ephemeral 인프라가 아직 안 올라온 경우 (spin-up 미실행) terraform output 이
          # 'Warning: No outputs found' 를 stdout 으로 뱉어 GITHUB_OUTPUT 형식이 깨진다.
          # 빠르게 명확한 에러로 실패하도록 가드한다.
          if [ "$(terraform output -json | jq -r 'length')" = "0" ]; then
            echo "::error::infra/ephemeral 의 출력값이 비어 있다. spin-up 워크플로를 먼저 실행하라."
            exit 1
          fi
          # 각 출력값을 한 번에 변수로 받아 빈 값이면 명확히 실패시킨다.
          declare -A out
          for k in app_public_ip app_private_ip bastion_public_ip rds_endpoint rds_port rds_master_secret_arn api_url; do
            v=$(terraform output -raw "$k" 2>/dev/null || true)
            if [ -z "$v" ]; then
              echo "::error::terraform output '$k' 가 비어 있다. ephemeral apply 결과를 확인하라."
              exit 1
            fi
            out[$k]="$v"
          done
          {
            echo "app_ip=${out[app_public_ip]}"
            echo "app_private_ip=${out[app_private_ip]}"
            echo "bastion_ip=${out[bastion_public_ip]}"
            echo "rds_endpoint=${out[rds_endpoint]}"
            echo "rds_port=${out[rds_port]}"
            echo "rds_master_secret_arn=${out[rds_master_secret_arn]}"
            echo "api_url=${out[api_url]}"
          } >>"$GITHUB_OUTPUT"
          # SSH private key 는 terraform state 의 sensitive output 으로만 보관. 워크플로 로그에
          # 노출되지 않도록 GITHUB_OUTPUT 에 넣지 않고 다음 step 으로 파일로 전달한다.
          terraform output -raw ec2_ssh_private_key_pem >"$RUNNER_TEMP/ku-helper.pem"
          chmod 0600 "$RUNNER_TEMP/ku-helper.pem"

      - name: Prepare SSH key
        run: |
          install -d -m 0700 ~/.ssh
          install -m 0600 "$RUNNER_TEMP/ku-helper.pem" ~/.ssh/ku-helper.pem
          rm -f "$RUNNER_TEMP/ku-helper.pem"
          # app private IP 는 runner 에서 keyscan 불가(도달 불가). accept-new 로 처리한다.
          ssh-keyscan -H ${{ steps.tf.outputs.bastion_ip }} >>~/.ssh/known_hosts 2>/dev/null || true

      - name: Alembic migrate (via bastion tunnel)
        working-directory: backend
        env:
          BASTION_IP: ${{ steps.tf.outputs.bastion_ip }}
          RDS_HOST: ${{ steps.tf.outputs.rds_endpoint }}
          RDS_PORT: ${{ steps.tf.outputs.rds_port }}
          RDS_MASTER_SECRET_ARN: ${{ steps.tf.outputs.rds_master_secret_arn }}
          # alembic 은 ALEMBIC_DATABASE_URL 만 사용하지만, env.py 가 import 하는
          # app.core.database 가 module-level 에서 Settings() 를 인스턴스화한다.
          # 마이그레이션은 비밀을 사용하지 않으므로 검증 통과용 더미만 주입한다.
          JWT_SECRET: alembic-only-dummy-not-a-real-secret
          DISCORD_CLIENT_ID: dummy
          DISCORD_CLIENT_SECRET: dummy
          DISCORD_BOT_TOKEN: dummy
          DISCORD_REDIRECT_URI: https://dummy.invalid/callback
          USE_IAM_AUTH: "false"
          DATABASE_URL: postgresql+asyncpg://alembic-dummy
          REDIS_URL: redis://alembic-dummy
        run: |
          uv sync --no-dev
          # bastion 경유 SSH 터널 — 로컬 15432 → RDS 5432
          ssh -i ~/.ssh/ku-helper.pem -o StrictHostKeyChecking=accept-new \
              -f -N -L 15432:${RDS_HOST}:${RDS_PORT} \
              ec2-user@${BASTION_IP}
          # master 패스워드 fetch (마이그레이션은 IAM user 가 아닌 master 권한으로)
          MASTER_PW=$(aws secretsmanager get-secret-value \
            --secret-id "$RDS_MASTER_SECRET_ARN" \
            --query SecretString --output text | python3 -c 'import sys,json; print(json.load(sys.stdin)["password"])')
          export ALEMBIC_DATABASE_URL="postgresql+asyncpg://postgres:${MASTER_PW}@localhost:15432/ku_helper"
          uv run alembic upgrade head
          # tunnel 정리
          pkill -f "ssh.*15432:${RDS_HOST}" || true

      - name: Rollout backend container on app EC2
        env:
          APP_PRIVATE_IP: ${{ steps.tf.outputs.app_private_ip }}
          BASTION_IP: ${{ steps.tf.outputs.bastion_ip }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          # app EC2 의 22 는 bastion SG 참조로만 열려 있어 app 의 private IP 로만 도달한다.
          # bastion 을 점프 호스트로 경유하고 최종 홉은 app private IP 로 SSH 한다. ssh -J
          # 단축형은 명령행 -i 키가 최종 목적지에 일관되게 전달되지 않을 수 있어, ProxyCommand
          # 로 두 홉 모두에 키를 명시한다.
          ssh -o ProxyCommand="ssh -i ~/.ssh/ku-helper.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -W %h:%p ec2-user@${BASTION_IP}" \
              -i ~/.ssh/ku-helper.pem \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              ec2-user@${APP_PRIVATE_IP} <<EOF
          set -euo pipefail
          cd /opt/ku-helper
          # SSM 최신 시크릿으로 app.env 와 GitHub Container Registry 로그인 갱신
          sudo /opt/ku-helper/refresh-env.sh
          docker compose pull backend
          docker compose up -d backend
          EOF

      - name: Health check
        env:
          API_URL: ${{ steps.tf.outputs.api_url }}
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "${API_URL}/health" >/dev/null; then
              echo "backend healthy"; exit 0
            fi
            sleep 5
          done
          echo "backend health check timed out" >&2
          exit 1
