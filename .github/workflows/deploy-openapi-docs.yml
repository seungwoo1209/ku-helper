name: Deploy OpenAPI Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-openapi-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --frozen

      - name: Regenerate openapi.json
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/dummy
          CORS_ORIGINS: '["http://localhost:3000"]'
          JWT_SECRET: ci-dummy-secret-not-used-at-runtime
          DISCORD_CLIENT_ID: dummy
          DISCORD_CLIENT_SECRET: dummy
          DISCORD_BOT_TOKEN: dummy
          DISCORD_REDIRECT_URI: http://localhost:8000/api/v1/auth/discord/callback
        run: uv run python scripts/regenerate_openapi.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build static ReDoc HTML
        run: |
          mkdir -p site
          npx --yes @redocly/cli@latest build-docs backend/openapi.json -o site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
